name: cpf

services:
  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/gateway.Dockerfile
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - backend_storage:/var/www/backend/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    env_file:
      - path: ../../.env.production
        required: true
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - path: ../../cpf-backend/.env.production
        required: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  queue:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - path: ../../cpf-backend/.env.production
        required: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/var/www/html/storage
    command:
      - sh
      - -lc
      - until php artisan migrate:status >/dev/null 2>&1; do sleep 3; done; php artisan queue:work --sleep=3 --tries=3 --timeout=120 --max-time=3600
    restart: unless-stopped

  scheduler:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - path: ../../cpf-backend/.env.production
        required: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/var/www/html/storage
    command:
      - sh
      - -lc
      - until php artisan migrate:status >/dev/null 2>&1; do sleep 3; done; while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: ["mysqld", "--innodb-buffer-pool-size=256M"]
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  backend_storage:
